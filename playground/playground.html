<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Super FunFunFun Scavenger Hunt</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Schoolbell&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
font-family:'Patrick Hand',cursive;
}

body{


background-image:
linear-gradient(rgba(255,255,255,.15),rgba(255,255,255,.15)),
url("playground.jpg");

background-size:cover;
background-position:center;
cursor:url("https://cur.cursors-4u.net/nature/nat-10/nat987.cur"), auto;


}

/* ---------- CENTER PAPER ---------- */

#paper{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%) rotate(-2deg);

width:min(450px,90vw);

background:#f3e37d;

padding:50px;

border-radius:8px;

box-shadow:
0 25px 50px rgba(0,0,0,.25);

z-index:50;

}

#paper:before{

content:"";

position:absolute;

inset:0;

background:
radial-gradient(circle at top left,#ffffff,transparent 40%),
radial-gradient(circle at bottom right,#ece5cf,transparent 45%);

mix-blend-mode:multiply;

opacity:.5;

pointer-events:none;

}

h1{

font-family:'Schoolbell',cursive;

font-size:3.5rem;

line-height:.95;

text-align:center;

margin-bottom:10px;

}

h2{

text-align:center;

font-size:2rem;

font-weight:normal;

margin-bottom:20px;

}

#paper p{

text-align:center;

font-size:1.35rem;

opacity:.7;

}

/* ---------- PLAYGROUND OBJECTS ---------- */

.object{

position:absolute;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:6px;

cursor:pointer;

transition:.25s;

text-align:center;

user-select:none;

}

.object span{

font-size:90px;

transition:.25s;

}

.object:hover span{

transform:scale(1.15) rotate(-8deg);

}

.object small{

font-family:'Patrick Hand',cursive;

font-size:18px;

color:#2d2d2d;

text-shadow:
1px 1px 3px rgba(255,255,255,.9);

margin-top:-2px;

letter-spacing:.5px;

white-space:nowrap;

}

/* clouds */

#rules{

top:50px;
left:-150px;

font-size:90px;

animation:cloudOne 35s linear infinite;

}

#cloud2{

top:120px;
left:-400px;

font-size:70px;

animation:cloudTwo 55s linear infinite;

}

@keyframes cloudOne{

from{

left:-200px;

}

to{

left:110%;

}

}

@keyframes cloudTwo{

from{

left:-500px;

}

to{

left:110%;

}

}

/* tree */

#story{

left:60px;

bottom:120px;

font-size:170px;

}

/* slide */

#permission{

left:300px;

bottom:80px;

font-size:140px;

}

/* monkey bars */

#what{

left:88%;

bottom:333px;

transform:translateX(-50%);

}

/* backpack */

#pack{

right:300px;

bottom:80px;

}

/* trash */

#nope{

right:170px;

bottom:90px;

}

/* juice */

#who{

right:280px;

bottom:320px;

}

/* flowers */

#might{

left:50%;

bottom:20px;

transform:translateX(-50%);

font-size:60px;

}
#confetti{

position:fixed;

inset:0;

pointer-events:none;

overflow:hidden;

z-index:998;
}

#sun{

position:absolute;

top:40px;
right:60px;

font-size:110px;

animation:spin 35s linear infinite;

}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}
#kite{

position:absolute;

top:70px;
left:50%;

transform:translateX(-50%);

font-size:70px;

animation:kiteFloat 5s ease-in-out infinite;

}

@keyframes kiteFloat{

50%{

transform:
translateX(-50%)
translateY(-20px)
rotate(-8deg);

}

}

/* ---------- POPUP ---------- */

#popup{

position:fixed;

inset:0;

display:none;

justify-content:center;

align-items:center;

background:rgba(0,0,0,.45);

z-index:999;

}

#card{

background:#fffdf4;
border:2px solid #ece3c9;

width:min(700px,92vw);

max-height:80vh;

overflow:auto;

padding:45px;

border-radius:14px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

transform:rotate(-1deg);

}

#card h3{

font-family:'Schoolbell',cursive;

font-size:2.2rem;

margin-bottom:20px;

}

#card p{

font-size:1.4rem;

line-height:1.6;

white-space:pre-line;

}

button{

margin-top:30px;

padding:14px 28px;

font-size:1.1rem;

border:none;

border-radius:999px;

cursor:pointer;

background:#ffd95c;

}

/* ---------- ANIMATION ---------- */

@keyframes float{

50%{

transform:translateY(-12px);

}

}

/* ---------- MOBILE ---------- */

@media (max-width:768px){

html,body{
overflow:auto;
overflow-x:hidden;
}

#scene{
position:relative;
width:100%;
height:100vh;
}

/* Paper */

#paper{

width:55vw;
padding:35px 25px;

top:50%;
left:50%;

transform:translate(-50%,-50%) rotate(-2deg);

z-index:50;

}

h1{
font-size:2.2rem;
}

h2{
font-size:1.6rem;
}

#paper p{
font-size:1.2rem;
}

/* Bigger tap targets */

.object{
padding:10px;
}

.object span{
font-size:60px;
}

.object small{
font-size:16px;
white-space:normal;
text-align:center;
max-width:90px;
}

/* Playground Layout */

#sun{
top:40px;
right:20px;
font-size:80px;
}

#kite{
top:70px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

#rules{
top:30px;
left:-60px;
font-size:70px;
}

#cloud2{
top:100px;
left:-180px;
font-size:60px;
}

#story{
left:20px;
bottom:170px;
font-size:120px;
}

#permission{
right:10px;
left:auto;
bottom:90px;
font-size:100px;
}

#pack{
left:15px;
right:auto;
bottom:20px;
}

#might{
left:50%;
bottom:30px;
transform:translateX(-50%);
}

#who{
right:10px;
bottom:310px;
}

#what{
right:10px;
left:auto;
bottom:430px;
transform:none;
}

#nope{
right:20px;
bottom:70px;
}

}

</style>
</head>

<body>

<!-- CENTER -->

<div id="paper">

<h1>

The Super<br>
FunFunFun<br>
Scavenger Hunt

</h1>

<h2>

for Curious Adults

</h2>

<p>

Click around the playground to explore.

</p>

</div>

<!-- OBJECTS -->

<!-- OBJECTS -->

<div class="object" id="rules">
    <span>☁️</span>
    <small>Camp Rules</small>
</div>

<div class="object" id="cloud2">
    <span>☁️</span>
</div>

<div class="object" id="story">
    <span>🌳</span>
    <small>Why?</small>
</div>

<div class="object" id="sun">
    <span>☀️</span>
</div>

<div class="object" id="kite">
    <span>🪁</span>
    <small>Save the Date</small>
</div>

<div class="object" id="permission">
    <span>📜</span>
    <small>Permission Slip</small>
</div>

<div class="object" id="what">
    <span>🪜</span>
    <small>How it Works</small>
</div>

<div class="object" id="who">
    <span>🧃</span>
    <small>Who's This For?</small>
</div>

<div class="object" id="pack">
    <span>🎒</span>
    <small>Packing List</small>
</div>

<div class="object" id="nope">
    <span>🚮</span>
    <small>Definitely Not</small>
</div>

<div class="object" id="might">
    <span>🌼🌸🌻</span>
    <small>What Might Happen</small>
</div>

<!-- POPUP -->

<div id="popup">

<div id="card">

<h3 id="popupTitle"></h3>

<p id="popupText"></p>

<button id="closeButton">

Keep Exploring →

</button>

</div>

</div>
<!-- CONFETTI -->

<div id="confetti"></div>


<script>

const popup = document.getElementById("popup");
const title = document.getElementById("popupTitle");
const text = document.getElementById("popupText");

function openCard(cardTitle, cardText){

    title.innerHTML = cardTitle;
    text.innerHTML = cardText;
    popup.style.display = "flex";

}
function explode(){

const emojis=["🎉","✨","⭐","🎈","🎟️","🎊"];

for(let i=0;i<70;i++){

const piece=document.createElement("div");

piece.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

piece.style.position="absolute";

piece.style.left=Math.random()*100+"vw";

piece.style.top="-50px";

piece.style.fontSize=(20+Math.random()*30)+"px";

piece.style.transition="2s linear";

document.getElementById("confetti").appendChild(piece);

setTimeout(()=>{

piece.style.transform=
`translateY(${window.innerHeight+100}px)
rotate(${Math.random()*720}deg)`;

},20);

setTimeout(()=>piece.remove(),2200);

}

}
document.getElementById("closeButton").onclick = () => {

    popup.style.display = "none";

}

popup.onclick = (e)=>{

    if(e.target === popup){

        popup.style.display="none";

    }

}

/* ----------------------------
PERMISSION TO PLAY
---------------------------- */

document.getElementById("permission").onclick = ()=>{

openCard(

"📜 Permission to Play",

`Valid for:

One afternoon.

Approved activities:

☑ Cartwheels

☑ Talking to strangers

☑ Dancing in public

☑ Laughing too loudly

☑ Frolicking

Signed,

FunFunFun`

);

}

/* ----------------------------
TREE
---------------------------- */

document.getElementById("story").onclick = ()=>{

openCard(

"🌳 Somewhere Along the Way...",

`Somewhere along the way...

We got really good at being adults.

We optimise.

We schedule.

We multitask.

We count our steps.

We end our days with a nice doom scroll.

But we forgot how to play.`


);

}

/* ----------------------------
WHAT IS THIS?
---------------------------- */

document.getElementById("what").onclick=()=>{

explode();

openCard(

"🎟️ Tickets Unlocked!",

`Imagine if...

a scavenger hunt...

met summer camp...

met your favourite field trip...

met a social experiment.

You'll be placed on a team with a handful of beautiful strangers.

You'll complete playful missions around Lisbon.

Tickets coming soon ✨`

);

}

/* ----------------------------
WHO IS THIS FOR?
---------------------------- */

document.getElementById("who").onclick = ()=>{

openCard(

"🧃 Who Is This For?",

`People who miss recess.

People who like touching grass. 

People who want stories instead of small talk.

People who like saying yes and. 

People who want to meet new people without awkward networking.

People who miss being eight years old.`

);

}

/* ----------------------------
RULES
---------------------------- */

document.getElementById("rules").onclick = ()=>{

openCard(

"☁️ Rules",

`🌼 Lollygag.

🌼 Frolick as much as possible.

🌼 Play wholeheartedly.

🌼 Leave Lisbon better than you found it.

🌼 The only way to lose is worrying about looking cool.`

);

}

document.getElementById("cloud2").onclick = document.getElementById("rules").onclick;

/* ----------------------------
WHAT MIGHT HAPPEN
---------------------------- */

document.getElementById("might").onclick = ()=>{

openCard(

"🌼 Things That Might Happen",

`✔ Invent a team handshake.

✔ Learn someone's favourite song.

✔ Draw with chalk.

✔ Skip down a street.

✔ Become friends with a stranger.

✔ Find your new favourite café.

✔ Remember what it feels like to be eight years old.`

);

}

/* ----------------------------
WHAT WON'T HAPPEN
---------------------------- */

document.getElementById("nope").onclick = ()=>{

openCard(

"🚫 Things That Won't Happen",

`❌ Awkward networking.

❌ Forced introductions.

❌ Name tags with "fun facts."

❌ Icebreaker bingo.

❌ Complaining.`

);

}

/* ----------------------------
PACKING LIST
---------------------------- */

document.getElementById("pack").onclick = ()=>{

openCard(

"🎒 What to Pack",

`Comfortable shoes.

Water.

A fully charged phone
(for photos, not scrolling.)

Curiosity.`

);

}

document.getElementById("kite").onclick=()=>{

openCard(

"🪁 Save the Date",

`Sunday, August 2nd

Lisbon

Adventure begins soon.

Tickets `

);

}


</script>
</body>
</html>
